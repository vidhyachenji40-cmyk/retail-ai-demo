<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Retail Search Demo</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f7f6; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 12px; width: 300px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        h1 { color: #202124; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 AI Product Search</h1>
        <p>Type "Hoodie" or "Backpack" to see Vertex AI in action.</p>
        
        <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=en_GB"></script>
        <gen-search-widget
          configId="f3a16c32-5f42-4f92-bb7c-2f3778794918"
          triggerId="searchWidgetTrigger">
        </gen-search-widget>
        <input placeholder="Search our catalog..." id="searchWidgetTrigger" />
        </div>

</body>
</html>
